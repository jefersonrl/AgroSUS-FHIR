name: GitHub Pages build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: agrosus-gh-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Instalar Jekyll
        run: gem install jekyll bundler --no-document

      - name: Instalar SUSHI
        run: npm install --global fsh-sushi

      - name: Instalar pacotes e templates FHIR
        shell: bash
        run: |
          set -euo pipefail

          install_fhir_package() {
            local package_id="$1"
            local package_version="$2"
            local package_url="$3"
            local destination="$HOME/.fhir/packages/${package_id}#${package_version}"
            local archive="/tmp/${package_id}-${package_version}.tgz"

            mkdir -p "$destination"
            curl --fail --location --retry 3 --retry-all-errors \
              "$package_url" \
              --output "$archive"
            tar --extract --gzip --file "$archive" --directory "$destination"
            test -f "$destination/package/package.json"
          }

          install_fhir_template() {
            local package_id="$1"
            local package_version="$2"
            local repository="$3"
            local revision="$4"
            local destination="$HOME/.fhir/packages/${package_id}#${package_version}"
            local archive="/tmp/${package_id}-${revision}.tar.gz"
            local source_dir="/tmp/${package_id}-${revision}"

            mkdir -p "$destination" "$source_dir"
            curl --fail --location --retry 3 --retry-all-errors \
              "https://github.com/${repository}/archive/${revision}.tar.gz" \
              --output "$archive"
            tar --extract --gzip --file "$archive" \
              --directory "$source_dir" \
              --strip-components=1
            tar --create --file - --directory "$source_dir" . \
              | tar --extract --file - --directory "$destination"
            test -f "$destination/package/package.json"
            test -f "$destination/config.json"
          }

          install_fhir_package \
            "br.gov.saude.br-core.fhir" \
            "1.0.0" \
            "https://hl7.org.br/fhir/core/package.tgz"

          install_fhir_package \
            "br.gov.saude.terminologia.fhir" \
            "1.0.0" \
            "https://terminologia.saude.gov.br/fhir/package.tgz"

          install_fhir_package \
            "br.gov.saude.ips.fhir" \
            "1.0.0" \
            "https://hl7.org.br/fhir/ips/package.tgz"

          # Corrige metadados inválidos presentes nos pacotes brasileiros 1.0.0.
          # As correções são aplicadas somente à cópia efêmera do cache do build.
          ips_package="$HOME/.fhir/packages/br.gov.saude.ips.fhir#1.0.0/package/package.json"
          br_core_encounter="$HOME/.fhir/packages/br.gov.saude.br-core.fhir#1.0.0/package/StructureDefinition-br-core-encounter.json"
          temporary_json="$(mktemp)"

          jq '.url = "https://ips.saude.gov.br/fhir"' \
            "$ips_package" > "$temporary_json"
          mv "$temporary_json" "$ips_package"

          temporary_json="$(mktemp)"
          jq '
            (.snapshot.element[]
              | select(.path == "Encounter.hospitalization.dischargeDisposition")
              | .binding.valueSet) = "https://terminologia.saude.gov.br/fhir/ValueSet/BRMotivoDesfecho"
            |
            (.differential.element[]
              | select(.path == "Encounter.hospitalization.dischargeDisposition")
              | .binding.valueSet) = "https://terminologia.saude.gov.br/fhir/ValueSet/BRMotivoDesfecho"
          ' "$br_core_encounter" > "$temporary_json"
          mv "$temporary_json" "$br_core_encounter"

          install_fhir_template \
            "fhir.base.template" \
            "1.0.0" \
            "HL7/ig-template-base" \
            "849a8f5298f521a0af0a48256d4a0c5a83297664"

          install_fhir_template \
            "who.template.root" \
            "current" \
            "WorldHealthOrganization/smart-ig-template" \
            "d45f03e499eda220160b2ff765a5bbd1dc14885b"

      - name: Validar FSH com SUSHI
        run: sushi .

      - name: Baixar o IG Publisher
        run: |
          mkdir -p input-cache
          curl --fail --location --retry 3 --retry-all-errors \
            "https://github.com/HL7/fhir-ig-publisher/releases/latest/download/publisher.jar" \
            --output input-cache/publisher.jar

      - name: Gerar o Implementation Guide
        env:
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          java -Xmx6g -jar input-cache/publisher.jar publisher \
            -ig . \
            -no-sushi \
            -auto-ig-build \
            -package-cache-folder "$HOME/.fhir/packages" \
            -repo "https://github.com/${REPOSITORY}/tree/${BRANCH}"

      - name: Publicar no GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: output
          clean: true