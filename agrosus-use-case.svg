<svg width="100%" viewBox="-25 0 770 480" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <title>Diagrama de caso de uso do AgroSUS</title>
  <desc>Casos de uso do AgroSUS: Produtor Rural e Agente Comunitário Familiar à esquerda; API Externa, Unidade Básica de Saúde e Médico à direita. Realizar Triagem como caso de uso central.</desc>
  <style>
    .actor-label { font-size: 12px; text-anchor: middle; fill: black; }
    .uc-label { font-size: 12px; text-anchor: middle; fill: black; }
    .rel-label { font-size: 10px; text-anchor: middle; fill: black; }
    .title-label { font-size: 12px; text-anchor: middle; font-weight: bold; fill: black; }
    .uc { fill: white; stroke: black; stroke-width: 1.3; }
    .sysbox { fill: none; stroke: black; stroke-width: 1.3; }
    .assoc { stroke: black; stroke-width: 1; fill: none; }
    .dep { stroke: black; stroke-width: 1; fill: none; stroke-dasharray: 4 3; }
    .actor { stroke: black; stroke-width: 1.3; fill: none; }
  </style>

  <rect x="-25" y="0" width="770" height="480" fill="white"/>

  <!-- System boundary -->
  <rect class="sysbox" x="150" y="34" width="420" height="392"/>
  <text class="title-label" x="360" y="52">AgroSUS: Integração entre Agente Comunitário,</text>
  <text class="title-label" x="360" y="66">Pequeno Produtor Rural e UBS</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="black"/>
    </marker>
  </defs>

  <!-- Left actors -->
  <g>
    <circle class="actor" cx="45" cy="112" r="10"/>
    <line class="actor" x1="45" y1="122" x2="45" y2="150"/>
    <line class="actor" x1="30" y1="132" x2="60" y2="132"/>
    <line class="actor" x1="45" y1="150" x2="33" y2="170"/>
    <line class="actor" x1="45" y1="150" x2="57" y2="170"/>
    <text class="actor-label" x="45" y="186">Produtor Rural</text>

    <circle class="actor" cx="45" cy="290" r="10"/>
    <line class="actor" x1="45" y1="300" x2="45" y2="328"/>
    <line class="actor" x1="30" y1="310" x2="60" y2="310"/>
    <line class="actor" x1="45" y1="328" x2="33" y2="348"/>
    <line class="actor" x1="45" y1="328" x2="57" y2="348"/>
    <text class="actor-label" x="45" y="364">Agente Comunitário</text>
    <text class="actor-label" x="45" y="378">Familiar (ACF)</text>
  </g>

  <!-- Right actors -->
  <g>
    <circle class="actor" cx="675" cy="100" r="10"/>
    <line class="actor" x1="675" y1="110" x2="675" y2="138"/>
    <line class="actor" x1="660" y1="120" x2="690" y2="120"/>
    <line class="actor" x1="675" y1="138" x2="663" y2="158"/>
    <line class="actor" x1="675" y1="138" x2="687" y2="158"/>
    <text class="actor-label" x="675" y="174">API Externa</text>

    <circle class="actor" cx="675" cy="228" r="10"/>
    <line class="actor" x1="675" y1="238" x2="675" y2="266"/>
    <line class="actor" x1="660" y1="248" x2="690" y2="248"/>
    <line class="actor" x1="675" y1="266" x2="663" y2="286"/>
    <line class="actor" x1="675" y1="266" x2="687" y2="286"/>
    <text class="actor-label" x="675" y="302">Unidade Básica</text>
    <text class="actor-label" x="675" y="316">de Saúde</text>

    <circle class="actor" cx="675" cy="356" r="10"/>
    <line class="actor" x1="675" y1="366" x2="675" y2="394"/>
    <line class="actor" x1="660" y1="376" x2="690" y2="376"/>
    <line class="actor" x1="675" y1="394" x2="663" y2="414"/>
    <line class="actor" x1="675" y1="394" x2="687" y2="414"/>
    <text class="actor-label" x="675" y="430">Médico</text>
  </g>

  <!-- Use case ellipses -->
  <ellipse class="uc" cx="238" cy="96" rx="66" ry="28"/>
  <text class="uc-label" x="238" y="92">Gerenciar Processo</text>
  <text class="uc-label" x="238" y="106">Produtivo</text>

  <ellipse class="uc" cx="478" cy="96" rx="60" ry="28"/>
  <text class="uc-label" x="478" y="100">Classificar Risco</text>

  <ellipse class="uc" cx="205" cy="184" rx="64" ry="28"/>
  <text class="uc-label" x="205" y="180">Visualizar Produtor</text>
  <text class="uc-label" x="205" y="194">Rural</text>

  <ellipse class="uc" cx="360" cy="220" rx="66" ry="32"/>
  <text class="uc-label" x="360" y="224">Realizar Triagem</text>

  <ellipse class="uc" cx="510" cy="196" rx="62" ry="28"/>
  <text class="uc-label" x="510" y="192">Gerenciar</text>
  <text class="uc-label" x="510" y="206">Biomarcadores</text>

  <ellipse class="uc" cx="215" cy="298" rx="64" ry="28"/>
  <text class="uc-label" x="215" y="294">Manter Produtor</text>
  <text class="uc-label" x="215" y="308">Rural</text>

  <ellipse class="uc" cx="500" cy="298" rx="60" ry="28"/>
  <text class="uc-label" x="500" y="302">Solicitar Exames</text>

  <ellipse class="uc" cx="360" cy="382" rx="70" ry="30"/>
  <text class="uc-label" x="360" y="378">Monitorar</text>
  <text class="uc-label" x="360" y="392">Acompanhamento</text>

  <!-- Actor - use case associations (solid) -->
  <line class="assoc" x1="60" y1="130" x2="172" y2="98"/>
  <line class="assoc" x1="60" y1="300" x2="151" y2="298"/>
  <line class="assoc" x1="60" y1="345" x2="292" y2="382"/>
  <line class="assoc" x1="660" y1="115" x2="538" y2="98"/>
  <line class="assoc" x1="660" y1="245" x2="572" y2="204"/>
  <line class="assoc" x1="660" y1="365" x2="560" y2="300"/>
  <line class="assoc" x1="660" y1="380" x2="430" y2="382"/>

  <!-- includes / extends (dashed with arrow) -->
  <line class="dep" x1="330" y1="196" x2="270" y2="120" marker-end="url(#arrow)"/>
  <text class="rel-label" x="278" y="160">&lt;&lt;include&gt;&gt;</text>

  <line class="dep" x1="392" y1="196" x2="448" y2="118" marker-end="url(#arrow)"/>
  <text class="rel-label" x="442" y="160">&lt;&lt;include&gt;&gt;</text>

  <line class="dep" x1="448" y1="204" x2="426" y2="216" marker-end="url(#arrow)"/>
  <text class="rel-label" x="452" y="188">&lt;&lt;include&gt;&gt;</text>

  <line class="dep" x1="360" y1="252" x2="360" y2="352" marker-end="url(#arrow)"/>
  <text class="rel-label" x="392" y="304">&lt;&lt;include&gt;&gt;</text>

  <line class="assoc" x1="269" y1="290" x2="308" y2="242"/>

  <line class="dep" x1="269" y1="196" x2="298" y2="212" marker-end="url(#arrow)"/>
  <text class="rel-label" x="288" y="184">&lt;&lt;extend&gt;&gt;</text>

  <line class="dep" x1="215" y1="270" x2="215" y2="212" marker-end="url(#arrow)"/>
  <text class="rel-label" x="222" y="242">&lt;&lt;extend&gt;&gt;</text>

  <line class="dep" x1="440" y1="290" x2="416" y2="234" marker-end="url(#arrow)"/>
  <text class="rel-label" x="452" y="256">&lt;&lt;extend&gt;&gt;</text>
</svg>
